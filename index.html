<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Verb Practice — Feel</title>
<style>
  :root{
    --blue:#1e3a5f;
    --blue-light:#2e5a8f;
    --orange:#f5a623;
    --bg:#f4f6f9;
    --card:#ffffff;
    --text:#1e1e1e;
    --radius:14px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:var(--bg);
    color:var(--text);
    padding-bottom:40px;
  }
  header{
    background:var(--blue);
    color:#fff;
    padding:20px 16px 16px;
    text-align:center;
  }
  header h1{margin:0 0 4px;font-size:1.4rem;}
  header p{margin:0;font-size:.85rem;opacity:.85;}
  .section-title{
    margin:24px 16px 10px;
    color:var(--blue);
    font-size:1.1rem;
    border-left:5px solid var(--orange);
    padding-left:10px;
  }
  .card{
    background:var(--card);
    margin:10px 16px;
    padding:14px 16px;
    border-radius:var(--radius);
    box-shadow:0 1px 4px rgba(0,0,0,.08);
    display:flex;
    align-items:center;
    gap:14px;
  }
  .play-btn{
    flex:none;
    width:52px;height:52px;
    border-radius:50%;
    border:none;
    background:var(--blue-light);
    color:#fff;
    font-size:1.2rem;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
    transition:transform .1s ease;
  }
  .play-btn:active{transform:scale(.92);}
  .play-btn.playing{background:var(--orange);}
  .label{
    font-size:1rem;
    font-weight:600;
    color:var(--blue);
  }
  .label span{
    display:block;
    font-weight:400;
    font-size:.78rem;
    color:#888;
    margin-top:2px;
  }

  /* Record section */
  .record-panel{
    margin:28px 16px 10px;
    background:var(--blue);
    color:#fff;
    border-radius:var(--radius);
    padding:20px 16px;
    text-align:center;
  }
  .record-panel h2{margin:0 0 6px;font-size:1.1rem;}
  .record-panel p{margin:0 0 16px;font-size:.85rem;opacity:.9;}
  .mic-btn{
    width:74px;height:74px;
    border-radius:50%;
    border:none;
    background:#e63946;
    color:#fff;
    font-size:1.6rem;
    display:inline-flex;align-items:center;justify-content:center;
    cursor:pointer;
    box-shadow:0 3px 10px rgba(0,0,0,.3);
    transition:transform .15s ease, background .2s ease;
  }
  .mic-btn.recording{
    background:#ff5c5c;
    animation:pulse 1.1s infinite;
  }
  @keyframes pulse{
    0%{box-shadow:0 0 0 0 rgba(255,92,92,.6);}
    70%{box-shadow:0 0 0 16px rgba(255,92,92,0);}
    100%{box-shadow:0 0 0 0 rgba(255,92,92,0);}
  }
  .status{margin-top:10px;font-size:.85rem;min-height:18px;}
  .playback-row{
    margin-top:14px;
    display:none;
    flex-direction:column;
    gap:10px;
    align-items:center;
  }
  .playback-row.active{display:flex;}
  audio.preview{width:100%;max-width:320px;}
  .action-btns{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    justify-content:center;
  }
  .btn{
    border:none;
    border-radius:24px;
    padding:10px 18px;
    font-size:.9rem;
    font-weight:600;
    cursor:pointer;
  }
  .btn.share{background:#25D366;color:#fff;}
  .btn.download{background:var(--orange);color:#1e1e1e;}
  .btn.reset{background:rgba(255,255,255,.15);color:#fff;}
  .btn.showtext{background:#fff;color:var(--blue);margin:0 auto;display:block;}

  .text-reveal{
    display:none;
    text-align:left;
    background:rgba(255,255,255,.08);
    border-radius:10px;
    padding:14px 16px;
    margin-top:16px;
    font-size:.85rem;
    line-height:1.5;
  }
  .text-reveal.active{display:block;}
  .text-reveal p{margin:0 0 8px;}
  .text-reveal p:last-child{margin-bottom:0;}
  .text-reveal b{color:var(--orange);}

  footer{
    text-align:center;
    font-size:.75rem;
    color:#888;
    margin-top:30px;
  }
</style>
</head>
<body>

<header>
  <h1>Verb Practice: Feel</h1>
  <p>Listen carefully and decode each example — no text yet!</p>
</header>

<div id="sections"></div>

<div class="record-panel">
  <h2>Record Your Own</h2>
  <p>Tap the mic, say a sentence using "feel," then tap again to stop.</p>
  <button class="mic-btn" id="micBtn">🎤</button>
  <div class="status" id="status"></div>
  <div class="playback-row" id="playbackRow">
    <audio class="preview" id="previewAudio" controls></audio>
    <div class="action-btns">
      <button class="btn share" id="shareBtn">Share to WhatsApp</button>
      <button class="btn download" id="downloadBtn">Download</button>
      <button class="btn reset" id="resetBtn">Record Again</button>
    </div>
  </div>
  <button class="btn showtext" id="showTextBtn" style="margin-top:18px;">Show me the text</button>
  <div class="text-reveal" id="textReveal"></div>
</div>

<footer>Academia Europea · Phase 2B · Verb: Feel</footer>

<script>
const sentences = [
  "Do you ever feel lonely? — Yes, I occasionally feel lonely.",
  "Does the baby feel happy when he is with his mother? — Yes, the baby feels happy when he is with his mother.",
  "How often does the housekeeper feel exhausted? — The housekeeper almost never feels exhausted.",
  "Why does she feel bad? — She feels bad because her boss told her to work all weekend.",
  "Have you ever felt angry at church? — No, I have never felt angry at church.",
  "Where has he felt the sun on his face? — He has felt the sun on his face in the swimming pool.",
  "Why have you felt upset? — I have felt upset because my boss does not understand me.",
  "Have you felt frustrated in English class? — No, I have never felt frustrated in English class."
];

const container = document.getElementById('sections');
let currentlyPlaying = null;

const title = document.createElement('div');
title.className = 'section-title';
title.textContent = 'Listen & Repeat';
container.appendChild(title);

sentences.forEach((text, i) => {
  const n = i + 1;
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <button class="play-btn" data-src="audio/${n}.m4a" aria-label="Play example ${n}">▶</button>
    <div class="label">Example ${n}<span>Tap to listen</span></div>
  `;
  container.appendChild(card);
});

container.addEventListener('click', e => {
  const btn = e.target.closest('.play-btn');
  if (!btn) return;

  if (currentlyPlaying && currentlyPlaying.btn === btn) {
    currentlyPlaying.audio.pause();
    currentlyPlaying.audio.currentTime = 0;
    btn.classList.remove('playing');
    btn.textContent = '▶';
    currentlyPlaying = null;
    return;
  }

  if (currentlyPlaying) {
    currentlyPlaying.audio.pause();
    currentlyPlaying.btn.classList.remove('playing');
    currentlyPlaying.btn.textContent = '▶';
  }

  const audio = new Audio(btn.dataset.src);
  btn.classList.add('playing');
  btn.textContent = '⏸';
  audio.play().catch(() => {
    alert('Could not play audio file: ' + btn.dataset.src + '\nMake sure it exists in your audio/ folder.');
    btn.classList.remove('playing');
    btn.textContent = '▶';
  });
  audio.onended = () => {
    btn.classList.remove('playing');
    btn.textContent = '▶';
    currentlyPlaying = null;
  };
  currentlyPlaying = { btn, audio };
});

// ---------- Show text (revealed only in recording section) ----------
const showTextBtn = document.getElementById('showTextBtn');
const textReveal = document.getElementById('textReveal');
let textShown = false;

sentences.forEach((text, i) => {
  const p = document.createElement('p');
  p.innerHTML = `<b>${i + 1}.</b> ${text}`;
  textReveal.appendChild(p);
});

showTextBtn.addEventListener('click', () => {
  textShown = !textShown;
  textReveal.classList.toggle('active', textShown);
  showTextBtn.textContent = textShown ? 'Hide the text' : 'Show me the text';
});

// ---------- Recording ----------
let mediaRecorder;
let chunks = [];
let recordedBlob;
const micBtn = document.getElementById('micBtn');
const statusEl = document.getElementById('status');
const playbackRow = document.getElementById('playbackRow');
const previewAudio = document.getElementById('previewAudio');
const shareBtn = document.getElementById('shareBtn');
const downloadBtn = document.getElementById('downloadBtn');
const resetBtn = document.getElementById('resetBtn');

let isRecording = false;

micBtn.addEventListener('click', async () => {
  if (!isRecording) {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      chunks = [];
      mediaRecorder = new MediaRecorder(stream);
      mediaRecorder.ondataavailable = e => chunks.push(e.data);
      mediaRecorder.onstop = () => {
        recordedBlob = new Blob(chunks, { type: 'audio/webm' });
        previewAudio.src = URL.createObjectURL(recordedBlob);
        playbackRow.classList.add('active');
        statusEl.textContent = 'Recording ready — listen below, then share or download.';
        stream.getTracks().forEach(t => t.stop());
      };
      mediaRecorder.start();
      isRecording = true;
      micBtn.classList.add('recording');
      micBtn.textContent = '■';
      statusEl.textContent = 'Recording… tap again to stop.';
      playbackRow.classList.remove('active');
    } catch (err) {
      statusEl.textContent = 'Microphone access denied or unavailable.';
    }
  } else {
    mediaRecorder.stop();
    isRecording = false;
    micBtn.classList.remove('recording');
    micBtn.textContent = '🎤';
  }
});

resetBtn.addEventListener('click', () => {
  playbackRow.classList.remove('active');
  statusEl.textContent = '';
  recordedBlob = null;
});

downloadBtn.addEventListener('click', () => {
  if (!recordedBlob) return;
  const a = document.createElement('a');
  a.href = URL.createObjectURL(recordedBlob);
  a.download = 'my-recording-feel.webm';
  a.click();
});

shareBtn.addEventListener('click', async () => {
  if (!recordedBlob) return;
  const file = new File([recordedBlob], 'my-recording-feel.webm', { type: 'audio/webm' });

  if (navigator.canShare && navigator.canShare({ files: [file] })) {
    try {
      await navigator.share({
        files: [file],
        title: 'My recording',
        text: 'Here is my recorded sentence using "feel"!'
      });
    } catch (err) {
      // user cancelled — no action needed
    }
  } else {
    downloadBtn.click();
    statusEl.textContent = 'Your browser can\'t auto-attach audio. File downloaded — open WhatsApp and attach it manually.';
    window.open('https://wa.me/', '_blank');
  }
});
</script>

</body>
</html>
